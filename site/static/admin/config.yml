            options:
              - { label: "Best Pilot", value: "best-pilot" }
              - { label: "Best Pitch", value: "best-pitch" }
          - {label: "Credit", name: "credit", widget: "string", required: false}
          - {label: "Winner", name: "winner", widget: "boolean", default: false, required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  # 2026 Awards
  - name: "awards2026"
    label: "2026 / Awards"
    files:
      - label: "2026 Awards"
        name: "awards-2026"
        file: "site/content/awards-2026.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown", required: false}

  # 2025 Awards
  - name: "awards2025"
    label: "2025 / Awards"
    files:
      - label: "2025 Awards"
        name: "awards-2025"
        file: "site/content/awards-2025.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown", required: false}

  # Blog Posts
  - name: "post"
    label: "Blog Posts"
    folder: "site/content/post"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
