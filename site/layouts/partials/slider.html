{{ with .data }}
<div class="swiper-container">
  <div class="swiper-wrapper">
    {{ range .slides }}
    <div class="swiper-slide">
      <img src="{{ .image }}" loading="lazy" alt="" />
    </div>
    {{ end }}
  </div>
  <div class="swiper-button-next button button--secondary">next</div>
  <div class="swiper-button-prev button button--secondary">prev</div>
</div>
{{ end }}
